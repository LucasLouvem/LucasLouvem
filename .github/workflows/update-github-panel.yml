name: Update GitHub Profile Panel

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"
  push:
    paths:
      - "scripts/generate_github_panel.py"
      - ".github/workflows/update-github-panel.yml"

permissions:
  contents: write

jobs:
  update-panel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate profile panel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_github_panel.py

      - name: Commit panel updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update profile panel"
          file_pattern: assets/profile-light.svg assets/profile-dark.svg
